<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MNFX - Trading Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a, #1e2937); font-family: system-ui; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="min-h-screen text-white">

  <!-- PAGE LOGIN -->
  <div id="loginPage" class="max-w-md mx-auto p-6 min-h-screen flex items-center">
    <div class="glass rounded-3xl shadow-2xl p-10 w-full border border-white/10">
      <div class="text-center mb-8">
        <div class="inline-flex items-center gap-3 text-4xl font-bold">
          <i class="fas fa-chart-line text-emerald-400"></i>
          MNFX
        </div>
        <p class="text-emerald-400 text-lg mt-1">Trading • Forex • Crypto</p>
      </div>
      <h2 class="text-2xl font-semibold text-center mb-8">Connexion</h2>
      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm mb-2">Nom d'utilisateur ou email</label>
          <input type="text" id="username" value="demo" class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-400">
        </div>
        <div>
          <label class="block text-sm mb-2">Mot de passe</label>
          <input type="password" id="password" value="123456" class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-400">
        </div>
        <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 py-4 rounded-2xl font-semibold text-lg transition">Se connecter</button>
      </form>
      <p class="text-center text-xs text-white/50 mt-8">MNFX © 2026 • Démo éducative</p>
    </div>
  </div>

  <!-- DASHBOARD (caché au début) -->
  <div id="dashboardPage" class="hidden min-h-screen bg-[#0f172a]">
    <!-- Top bar -->
    <div class="bg-[#1e2937] px-6 py-4 flex items-center justify-between border-b border-white/10">
      <div class="flex items-center gap-3">
        <i class="fas fa-chart-line text-emerald-400 text-2xl"></i>
        <span class="font-bold text-2xl">MNFX</span>
      </div>
      <div class="flex items-center gap-6 text-sm">
        <div>Bonjour, <span id="userName" class="font-semibold">Demo</span></div>
        <button onclick="logout()" class="text-red-400 hover:text-red-500"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>

    <div class="p-6">
      <!-- Solde -->
      <div class="glass rounded-3xl p-6 mb-8">
        <p class="text-emerald-400 text-sm">SOLDE TOTAL</p>
        <p id="balance" class="text-5xl font-bold mt-2">2 691 410,00 €</p>
        <p class="text-emerald-400 text-sm flex items-center gap-2"><i class="fas fa-arrow-trend-up"></i> +12,4 % cette semaine</p>
      </div>

      <!-- Graphique -->
      <div class="glass rounded-3xl p-6 mb-8">
        <h3 class="font-semibold mb-4">Évolution du portefeuille</h3>
        <canvas id="chart" class="w-full h-64"></canvas>
      </div>

      <!-- Positions ouvertes -->
      <div class="glass rounded-3xl p-6">
        <h3 class="font-semibold mb-4">Positions ouvertes</h3>
        <div class="space-y-4">
          <div class="flex justify-between items-center border-b border-white/10 pb-4">
            <div>BTC/USD • Long</div>
            <div class="text-right">
              <div class="text-emerald-400">+1 240 €</div>
              <div class="text-xs text-white/60">2,4 lots • +4,8 %</div>
            </div>
          </div>
          <div class="flex justify-between items-center">
            <div>EUR/USD • Short</div>
            <div class="text-right">
              <div class="text-red-400">-320 €</div>
              <div class="text-xs text-white/60">1 lot • -1,2 %</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Simulation du graphique
    function createChart() {
      const ctx = document.getElementById('chart');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'],
          datasets: [{
            label: 'Valeur portefeuille',
            data: [2450000, 2510000, 2580000, 2620000, 2690000, 2685000, 2691410],
            borderColor: '#10b981',
            tension: 0.4,
            borderWidth: 3,
            pointRadius: 0
          }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { color: 'rgba(255,255,255,0.05)' } } } }
      });
    }

    // Connexion
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('dashboardPage').classList.remove('hidden');
      createChart();
    });

    function logout() {
      document.getElementById('dashboardPage').classList.add('hidden');
      document.getElementById('loginPage').classList.remove('hidden');
    }
  </script>
</body>
</html>
